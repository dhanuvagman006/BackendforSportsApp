services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sportyqo
      POSTGRES_PASSWORD: sportyqo
      POSTGRES_DB: sportyqo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportyqo"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://sportyqo:sportyqo@db:5432/sportyqo
      BASE_URL: http://localhost:8000
      JWT_SECRET: change-me-in-production
      ADMIN_API_KEY: change-me-admin-key
    ports:
      - "8000:8000"
    volumes:
      - storage:/srv/sportyqo/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  storage:
